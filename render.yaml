databases:
  - name: mcaz-db
    databaseName: mcaz
    user: mcaz_user
    region: oregon
    plan: free

services:
  - type: web
    name: mcaz-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mcaz-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TX_MAX_WAIT_MS
        value: '10000'
      - key: TX_TIMEOUT_MS
        value: '30000'
